name: 'CA - Image Highlight'
multiple: FALSE
category: 'Capital Azur'
enabled: TRUE
fields:
  title:
    type: text
    label: 'Title'
    options:
      '#required': TRUE
  description:
    type: textarea
    label: 'Description'
  image:
    type: image
    label: 'Image'
    options:
      '#required': TRUE
  image_position:
    type: select
    label: 'Image Position'
    options:
      '#default_value': 'left'
      '#options':
        left: 'Left (text on right)'
        right: 'Right (text on left)'
  background_color:
    type: text
    label: 'Background Color (hex, e.g. #1a6dd1)'
  text_color:
    type: text
    label: 'Text Color (hex, e.g. #ffffff)'
  link:
    type: url_extended
    label: 'CTA Button (optional)'
